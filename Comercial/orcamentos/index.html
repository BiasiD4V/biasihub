<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e2a5e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Comercial Biasi" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <title>BiasíHub</title>
  <script>
    // Captura o evento PWA o mais cedo possível, antes do React montar
    window.__pwaInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.__pwaInstallPrompt = e;
      window.dispatchEvent(new Event('pwaInstallReady'));
    });
    window.addEventListener('appinstalled', function() {
      window.__pwaInstallPrompt = null;
      window.dispatchEvent(new Event('pwaInstalled'));
    });
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
